<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Validar Vale — Caja</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e5e5e5;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:16px;font-weight:600}
.topbar-sub{font-size:12px;color:#888;margin-top:1px}
.container{max-width:520px;margin:0 auto;padding:24px 16px}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:20px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600;margin-bottom:4px}
.card-sub{font-size:13px;color:#666;margin-bottom:14px}
label{font-size:13px;color:#555;display:block;margin-bottom:5px;margin-top:14px}
label:first-of-type{margin-top:0}
input{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;background:#fff;color:#1a1a1a;transition:border .15s}
input:focus{border-color:#888}
.btn{width:100%;margin-top:12px;padding:11px;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:#1a1a1a}
.btn-info{background:#2563eb}
.btn-outline{background:#fff;color:#1a1a1a;border:1px solid #ddd}
.status-ok{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:20px;margin-top:14px}
.status-ok .st{color:#16a34a;font-weight:600;font-size:16px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.status-err{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:20px;margin-top:14px}
.status-err .st{color:#dc2626;font-weight:600;font-size:16px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.status-warn{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:20px;margin-top:14px}
.status-warn .st{color:#d97706;font-weight:600;font-size:16px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.dr{display:flex;justify-content:space-between;font-size:14px;padding:5px 0;border-bottom:1px solid #f0f0f0}
.dr:last-child{border-bottom:none}
.dr span:first-child{color:#666}.dr span:last-child{font-weight:500}
#cam-wrap{display:none;margin-bottom:12px}
#cam-video{width:100%;border-radius:10px;display:block;background:#000;max-height:300px;object-fit:cover}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.hist-item:last-child{border-bottom:none}
.badge-ok{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;background:#dcfce7;color:#15803d}
.setup-screen{max-width:360px;margin:60px auto;text-align:center;padding:0 16px}
.setup-screen i{font-size:48px;color:#ccc;margin-bottom:16px;display:block}
.setup-screen h2{font-size:18px;font-weight:600;margin-bottom:6px}
.setup-screen p{font-size:14px;color:#888;margin-bottom:20px;line-height:1.6}
.db-badge{font-size:11px;padding:3px 8px;border-radius:6px;background:#dcfce7;color:#15803d;font-weight:500}
.db-badge.offline{background:#fee2e2;color:#dc2626}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title" id="bar-nombre-display">Validar vale</div>
    <div class="topbar-sub">Caja</div>
  </div>
  <span class="db-badge offline" id="db-badge">⏳ conectando...</span>
</div>

<div id="setup-screen" class="setup-screen" style="display:none">
  <i class="ti ti-lock"></i>
  <h2>Configuración inicial</h2>
  <p>Ingresá la clave secreta que te dio el administrador.</p>
  <input type="password" id="setup-key" placeholder="Clave secreta HMAC..."/>
  <input type="text" id="setup-nombre" placeholder="Nombre del bar (opcional)" style="margin-top:8px"/>
  <button class="btn btn-primary" style="margin-top:12px" onclick="guardarSetup()"><i class="ti ti-check"></i> Guardar y comenzar</button>
</div>

<div id="app" style="display:none">
  <div class="container">
    <div class="card">
      <div class="card-title">Validar vale</div>
      <div class="card-sub">Escaneá el QR o pegá el código del vale.</div>
      <div id="cam-wrap">
        <video id="cam-video" autoplay playsinline muted></video>
        <p style="font-size:12px;color:#888;text-align:center;margin-top:6px">Apuntá al QR — se detecta automáticamente</p>
      </div>
      <button class="btn btn-info" onclick="toggleCam()" id="btn-cam"><i class="ti ti-camera"></i> Activar cámara</button>
      <label style="margin-top:14px">O pegá el código manualmente</label>
      <input type="text" id="val-text" placeholder="Pegar código del QR aquí..." oninput="limpiarVal()"/>
      <button class="btn btn-primary" id="btn-validar" onclick="validarVale()"><i class="ti ti-check"></i> Validar vale</button>
      <div id="val-result"></div>
    </div>

    <div class="card">
      <div class="card-title"><i class="ti ti-history"></i> Canjeados en esta sesión</div>
      <div style="margin-top:10px" id="hist-sesion"><p style="font-size:13px;color:#bbb">Ninguno aún.</p></div>
    </div>

    <div style="text-align:center;margin-top:4px">
      <button class="btn btn-outline" style="width:auto;padding:8px 16px;font-size:12px" onclick="cambiarClave()"><i class="ti ti-settings"></i> Cambiar clave</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyClVpb85PHHdNs9qRzfEXtuOqZH95rfmms",
  authDomain: "ps-vouchers.firebaseapp.com",
  projectId: "ps-vouchers",
  storageBucket: "ps-vouchers.firebasestorage.app",
  messagingSenderId: "502200885415",
  appId: "1:502200885415:web:b5b3cc80e8b7715fd97b82"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

const badge = document.getElementById('db-badge');
badge.textContent = '🟢 Conectado';
badge.classList.remove('offline');

let SECRET_KEY = '';
let BAR_NOMBRE = '';
let sessionCanjes = [];
let camStream = null;
let camInterval = null;

function init() {
  SECRET_KEY = localStorage.getItem('vqr_key') || '';
  BAR_NOMBRE = localStorage.getItem('vqr_nombre') || '';
  if (!SECRET_KEY) {
    document.getElementById('setup-screen').style.display = 'block';
  } else {
    mostrarApp();
  }
}

function mostrarApp() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  if (BAR_NOMBRE) document.getElementById('bar-nombre-display').textContent = BAR_NOMBRE;
}

window.guardarSetup = function() {
  const key = document.getElementById('setup-key').value.trim();
  const nombre = document.getElementById('setup-nombre').value.trim();
  if (!key) { alert('Ingresá la clave secreta.'); return; }
  SECRET_KEY = key; localStorage.setItem('vqr_key', key);
  if (nombre) { BAR_NOMBRE = nombre; localStorage.setItem('vqr_nombre', nombre); }
  mostrarApp();
};

window.cambiarClave = function() {
  if (confirm('¿Cambiar la clave secreta?')) {
    localStorage.removeItem('vqr_key'); SECRET_KEY = '';
    document.getElementById('app').style.display = 'none';
    document.getElementById('setup-key').value = '';
    document.getElementById('setup-screen').style.display = 'block';
  }
};

async function hmacSign(msg, key) {
  const enc = new TextEncoder();
  const k = await crypto.subtle.importKey('raw', enc.encode(key), {name:'HMAC',hash:'SHA-256'}, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', k, enc.encode(msg));
  return btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function hmacVerify(msg, sig, key) { return (await hmacSign(msg, key)) === sig; }

function tipoLabel(tipo, valor) {
  return {porcentaje:`${valor}% off`, monto:`$${valor} off`, '2x1':'2×1 tragos', copa_gratis:'Copa gratis'}[tipo] || tipo;
}

window.limpiarVal = function() { document.getElementById('val-result').style.display = 'none'; };

window.validarVale = async function() {
  const raw = document.getElementById('val-text').value.trim();
  const res = document.getElementById('val-result');
  const btn = document.getElementById('btn-validar');
  res.style.display = 'block';

  if (!raw || !raw.includes('.')) { res.innerHTML = mkErr('Formato inválido', 'El texto no corresponde a un código de vale.'); return; }

  const ld = raw.lastIndexOf('.');
  const data = raw.substring(0, ld), sig = raw.substring(ld+1);
  const ok = await hmacVerify(data, sig, SECRET_KEY);
  if (!ok) { res.innerHTML = mkErr('Firma inválida', 'Este QR fue alterado o es falso. Rechazalo.'); return; }

  let p;
  try { p = JSON.parse(decodeURIComponent(escape(atob(data)))); } catch(e) { res.innerHTML = mkErr('Error', 'Código corrupto.'); return; }

  const hoy = new Date().toISOString().split('T')[0];
  if (p.fecha < hoy) { res.innerHTML = mkWarn('Vale vencido', p, `Venció el ${p.fecha}.`); return; }

  btn.innerHTML = '<span class="spinner"></span> Verificando...';
  btn.disabled = true;

  try {
    // 1. Verificar si el vale fue cancelado por el admin
    const valeRef = doc(db, 'vales', p.id);
    const valeSnap = await getDoc(valeRef);
    if (valeSnap.exists() && valeSnap.data().cancelado) {
      res.innerHTML = mkErr('Vale cancelado', 'Este vale fue cancelado por el administrador. No es válido.');
      btn.innerHTML = '<i class="ti ti-check"></i> Validar vale'; btn.disabled = false;
      return;
    }

    // 2. Verificar si ya fue canjeado
    const canjeRef = doc(db, 'canjes', p.id);
    const canjeSnap = await getDoc(canjeRef);
    if (canjeSnap.exists()) {
      const cd = canjeSnap.data();
      res.innerHTML = mkWarn('Ya utilizado', p, `Canjeado el ${cd.canjeadoEn || '—'}.`);
      btn.innerHTML = '<i class="ti ti-check"></i> Validar vale'; btn.disabled = false;
      return;
    }

    // 3. Registrar el canje
    await setDoc(canjeRef, {
      id: p.id, tipo: p.tipo, valor: p.valor, fecha: p.fecha, nota: p.nota || '',
      canjeadoEn: new Date().toLocaleString('es'),
      canjeadoTs: serverTimestamp(),
      event: 'canjeado'
    });

    sessionCanjes.unshift({...p, hora: new Date().toLocaleTimeString()});
    renderSesion();

    res.innerHTML = `<div class="status-ok">
      <div class="st"><i class="ti ti-circle-check"></i> Vale válido — aplicar descuento</div>
      <div class="dr"><span>Descuento</span><span>${tipoLabel(p.tipo,p.valor)}</span></div>
      <div class="dr"><span>Válido hasta</span><span>${p.fecha}</span></div>
      ${p.nota?`<div class="dr"><span>Nota</span><span>${p.nota}</span></div>`:''}
      <div class="dr"><span>ID</span><span style="font-family:monospace;font-size:11px">${p.id}</span></div>
    </div>`;
    document.getElementById('val-text').value = '';

  } catch(e) {
    res.innerHTML = mkErr('Error de conexión', 'No se pudo verificar. Revisá tu internet.');
    console.error(e);
  }

  btn.innerHTML = '<i class="ti ti-check"></i> Validar vale';
  btn.disabled = false;
};

function mkErr(t,m){return`<div class="status-err"><div class="st"><i class="ti ti-circle-x"></i>${t}</div><p style="font-size:13px;color:#555">${m}</p></div>`;}
function mkWarn(t,p,m){return`<div class="status-warn"><div class="st"><i class="ti ti-alert-triangle"></i>${t}</div><p style="font-size:13px;color:#555">${m}</p>${p?`<div class="dr" style="margin-top:8px"><span>ID</span><span style="font-family:monospace;font-size:11px">${p.id}</span></div>`:''}</div>`;}

function renderSesion() {
  const el = document.getElementById('hist-sesion');
  if (!sessionCanjes.length) { el.innerHTML='<p style="font-size:13px;color:#bbb">Ninguno aún.</p>'; return; }
  el.innerHTML = sessionCanjes.map(c=>`
    <div class="hist-item">
      <div><span class="badge-ok">canjeado</span>
        <span style="margin-left:6px">${tipoLabel(c.tipo,c.valor)}</span>
        ${c.nota?`<span style="color:#bbb;font-size:12px"> · ${c.nota}</span>`:''}
      </div>
      <span style="font-size:11px;color:#bbb">${c.hora}</span>
    </div>`).join('');
}

window.toggleCam = async function() {
  if (camStream) { stopCam(); return; }
  try {
    camStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    document.getElementById('cam-video').srcObject = camStream;
    document.getElementById('cam-wrap').style.display = 'block';
    document.getElementById('btn-cam').innerHTML = '<i class="ti ti-camera-off"></i> Apagar cámara';
    const { default: jsQR } = await import('https://cdn.jsdelivr.net/npm/jsqr@1.4.0/+esm');
    camInterval = setInterval(() => scanFrame(jsQR), 400);
  } catch(e) { alert('No se pudo acceder a la cámara: ' + e.message); }
};

function stopCam() {
  if (camStream) { camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
  if (camInterval) { clearInterval(camInterval); camInterval=null; }
  document.getElementById('cam-wrap').style.display = 'none';
  document.getElementById('btn-cam').innerHTML = '<i class="ti ti-camera"></i> Activar cámara';
}

function scanFrame(jsQR) {
  const vid = document.getElementById('cam-video');
  if (!vid.videoWidth) return;
  const c = document.createElement('canvas'); c.width=vid.videoWidth; c.height=vid.videoHeight;
  c.getContext('2d').drawImage(vid,0,0);
  const img = c.getContext('2d').getImageData(0,0,c.width,c.height);
  const r = jsQR(img.data,img.width,img.height);
  if (r && r.data) { document.getElementById('val-text').value=r.data; stopCam(); window.validarVale(); }
}

init();
</script>
</body>
</html>
